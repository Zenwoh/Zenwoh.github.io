<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Latency Test</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --border: #2a2f3a;
      --text: #e6e8ee;
      --muted: #9aa3b2;
      --accent: #6ee7b7;
      --warn: #fbbf24;
      --danger: #f87171;
      --good: #6ee7b7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      max-width: 720px;
      width: 100%;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      margin: 0 0 20px 0;
      font-size: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    .screen {
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .big-msg {
      font-size: 24px;
      font-weight: 500;
      margin: 12px 0 8px 0;
      min-height: 32px;
    }

    .small-msg {
      color: var(--muted);
      font-size: 13.5px;
      margin: 0 0 18px 0;
      line-height: 1.5;
    }

    button {
      background: var(--accent);
      color: #0b3025;
      border: none;
      padding: 11px 22px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(1px);
    }

    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .progress {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      transition: width 0.25s ease-out;
    }

    .progress-label {
      color: var(--muted);
      font-size: 12px;
      width: 100%;
      text-align: right;
      margin-bottom: 28px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin: 14px 0 4px 0;
      width: 100%;
    }

    .result-cell {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px 4px;
      border-radius: 6px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      font-weight: 500;
    }

    .result-cell.trimmed {
      color: var(--muted);
      text-decoration: line-through;
      opacity: 0.5;
    }

    .result-cell.outlier {
      color: var(--warn);
      border-color: var(--warn);
      text-decoration: line-through;
      opacity: 0.85;
    }

    .result-cell.invalid {
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.4);
    }

    .legend {
      color: var(--muted);
      font-size: 12px;
      margin: 10px 0 22px 0;
      line-height: 1.6;
    }

    .legend .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin: 0 4px 0 10px;
      vertical-align: 1px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      margin-top: 6px;
    }

    .stat {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .headline-value {
      font-size: 44px;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      margin: 4px 0 2px 0;
    }

    .headline-unit {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 14px;
    }

    .system-info {
      color: var(--muted);
      font-size: 11.5px;
      margin-top: 18px;
      text-align: center;
      line-height: 1.6;
    }

    kbd {
      background: var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12.5px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Sound Reaction Time Test</h1>
    <p class="subtitle">14 trials, random pitches 200 Hz–10 kHz. Trimmed mean for hardware comparisons.</p>
    <div class="panel">
      <div class="screen" id="screen"></div>
    </div>
  </div>

  <script>
    (() => {
      // ---------- Config ----------
      const TRIALS = 14;
      const HZ_MIN = 200;
      const HZ_MAX = 10000;
      const GAP_MIN_MS = 1500;
      const GAP_MAX_MS = 4000;
      const TONE_DUR_MS = 150;
      const MISS_TIMEOUT_MS = 2000;
      const FEEDBACK_MS = 750;
      const TONE_GAIN = 0.22;

      // ---------- State ----------
      let audioCtx = null;
      let state = 'idle'; // 'idle' | 'running' | 'between' | 'done'
      let trialIndex = 0;
      let results = []; // [{ rt: number|null, freq: number, falseStart: boolean }]
      let toneFireTime = 0;          // performance.now() ms when the tone is expected at speakers
      let currentFreq = 0;
      let currentOsc = null;
      let missTimerId = null;

      const screen = document.getElementById('screen');

      const rnd = (a, b) => Math.random() * (b - a) + a;

      function ensureAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }

      // ---------- Screens ----------
      function showIdle() {
        state = 'idle';
        screen.innerHTML = `
      <div class="big-msg">Test your sound reaction time</div>
      <div class="small-msg">
        You'll hear 14 short tones at random intervals (1.5–4 s apart).<br>
        Click anywhere or hit <kbd>Space</kbd> as fast as you can after each one.<br>
        Don't react early — it'll count as a false start.
      </div>
      <button id="start-btn">Start test</button>
      <div class="small-msg" style="margin-top:22px;max-width:440px">
        Tip: keep your cursor over the page during the test, and use the same volume across sessions for fair hardware comparisons.
      </div>
    `;
        document.getElementById('start-btn').addEventListener('click', startTest);
        document.getElementById('start-btn').focus();
      }

      function startTest() {
        ensureAudio();
        trialIndex = 0;
        results = [];
        runTrial();
      }

      function renderRunning(msg, color) {
        const progress = Math.round((trialIndex / TRIALS) * 100);
        const c = color || 'var(--text)';
        screen.innerHTML = `
      <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
      <div class="progress-label">Trial ${Math.min(trialIndex + 1, TRIALS)} of ${TRIALS}</div>
      <div class="big-msg" style="color:${c}">${msg}</div>
      <div class="small-msg">Click anywhere or press <kbd>Space</kbd> the moment you hear the tone.</div>
    `;
      }

      // ---------- Trial loop ----------
      function runTrial() {
        if (trialIndex >= TRIALS) return finish();
        state = 'running';

        // Defensive cleanup
        if (currentOsc) { try { currentOsc.stop(); } catch (e) { } currentOsc = null; }
        if (missTimerId) { clearTimeout(missTimerId); missTimerId = null; }

        const gapMs = rnd(GAP_MIN_MS, GAP_MAX_MS);
        const freq = Math.round(rnd(HZ_MIN, HZ_MAX));
        currentFreq = freq;

        renderRunning('Listen…');

        // Schedule tone via Web Audio for precise timing
        const startAt = audioCtx.currentTime + gapMs / 1000;
        const stopAt = startAt + TONE_DUR_MS / 1000;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        // tiny ramp to avoid clicks
        gain.gain.setValueAtTime(0, startAt);
        gain.gain.linearRampToValueAtTime(TONE_GAIN, startAt + 0.005);
        gain.gain.setValueAtTime(TONE_GAIN, stopAt - 0.01);
        gain.gain.linearRampToValueAtTime(0, stopAt);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(startAt);
        osc.stop(stopAt + 0.05);
        currentOsc = osc;

        // Map the audio-context fire time onto performance.now() timeline
        const ctxNow = audioCtx.currentTime;
        const perfNow = performance.now();
        toneFireTime = perfNow + (startAt - ctxNow) * 1000;

        // Miss timeout: if no press within MISS_TIMEOUT after the tone fires
        missTimerId = setTimeout(() => {
          if (state === 'running') {
            recordResult(null, currentFreq, false);
          }
        }, (toneFireTime - performance.now()) + MISS_TIMEOUT_MS);
      }

      function recordResult(rt, freq, falseStart) {
        if (missTimerId) { clearTimeout(missTimerId); missTimerId = null; }
        state = 'between';

        // If false start, kill the still-scheduled tone so it doesn't bleed into next trial
        if (falseStart && currentOsc) {
          try { currentOsc.stop(); } catch (e) { }
          currentOsc = null;
        }

        results.push({ rt, freq, falseStart });
        trialIndex++;

        let msg, color;
        if (falseStart) { msg = 'False start — reacted before the tone'; color = 'var(--danger)'; }
        else if (rt === null) { msg = 'Miss — no response within 2 s'; color = 'var(--warn)'; }
        else { msg = `${Math.round(rt)} ms`; color = 'var(--good)'; }

        renderRunning(msg, color);
        setTimeout(runTrial, FEEDBACK_MS);
      }

      // ---------- Input ----------
      function handleResponse(pressTime) {
        if (state !== 'running') return;
        if (pressTime < toneFireTime) {
          recordResult(null, currentFreq, true);
        } else {
          recordResult(pressTime - toneFireTime, currentFreq, false);
        }
      }

      function onKey(e) {
        if (e.code !== 'Space') return;
        if (e.repeat) return;
        e.preventDefault();

        if (state === 'idle') {
          const btn = document.getElementById('start-btn');
          if (btn) btn.click();
          return;
        }
        if (state === 'done') {
          const btn = document.getElementById('restart-btn');
          if (btn) btn.click();
          return;
        }
        if (state === 'running') {
          handleResponse(performance.now());
        }
      }

      function onMouseDown(e) {
        if (state !== 'running') return;
        // Defensive: ignore clicks on buttons or interactive controls
        if (e.target.closest && e.target.closest('button, a, input, select, textarea')) return;
        e.preventDefault();
        handleResponse(performance.now());
      }

      // ---------- Finish & stats ----------
      function finish() {
        state = 'done';

        const valid = results
          .map((r, i) => ({ ...r, i }))
          .filter(r => r.rt !== null && !r.falseStart);

        if (valid.length < 5) {
          screen.innerHTML = `
        <div class="big-msg" style="color:var(--warn)">Not enough valid trials</div>
        <div class="small-msg">Need at least 5 clean trials to compute a meaningful average.</div>
        <div class="button-row"><button id="restart-btn">Try again</button></div>
      `;
          document.getElementById('restart-btn').addEventListener('click', showIdle);
          return;
        }

        // First pass: drop 2 fastest, 2 slowest among valid
        const sortedAsc = [...valid].sort((a, b) => a.rt - b.rt);
        const trimmedIdx = new Set();
        for (let k = 0; k < Math.min(2, sortedAsc.length); k++) trimmedIdx.add(sortedAsc[k].i);
        for (let k = 0; k < Math.min(2, sortedAsc.length); k++) trimmedIdx.add(sortedAsc[sortedAsc.length - 1 - k].i);

        const middle = valid.filter(r => !trimmedIdx.has(r.i));

        // Second pass: drop new min/max if > 2σ from middle mean
        const middleRts = middle.map(r => r.rt);
        const mean1 = middleRts.reduce((a, b) => a + b, 0) / middleRts.length;
        const var1 = middleRts.reduce((a, b) => a + (b - mean1) ** 2, 0) / middleRts.length;
        const std1 = Math.sqrt(var1);

        const outlierIdx = new Set();
        if (middle.length > 2 && std1 > 0) {
          const sortedMid = [...middle].sort((a, b) => a.rt - b.rt);
          const newMin = sortedMid[0];
          const newMax = sortedMid[sortedMid.length - 1];
          if (Math.abs((newMin.rt - mean1) / std1) > 2) outlierIdx.add(newMin.i);
          if (Math.abs((newMax.rt - mean1) / std1) > 2) outlierIdx.add(newMax.i);
        }

        const kept = middle.filter(r => !outlierIdx.has(r.i));
        const keptRts = kept.map(r => r.rt);
        const finalMean = keptRts.reduce((a, b) => a + b, 0) / keptRts.length;
        const keptVar = keptRts.reduce((a, b) => a + (b - finalMean) ** 2, 0) / keptRts.length;
        const keptStd = Math.sqrt(keptVar);
        const finalMin = Math.min(...keptRts);
        const finalMax = Math.max(...keptRts);

        // Build cells
        const cells = results.map((r, i) => {
          let cls = 'result-cell';
          let text;
          if (r.falseStart) { cls += ' invalid'; text = 'FS'; }
          else if (r.rt === null) { cls += ' invalid'; text = '—'; }
          else {
            text = `${Math.round(r.rt)} ms`;
            if (outlierIdx.has(i)) cls += ' outlier';
            else if (trimmedIdx.has(i)) cls += ' trimmed';
          }
          return `<div class="${cls}" title="freq: ${r.freq} Hz">${text}</div>`;
        }).join('');

        const baseLat = audioCtx.baseLatency != null ? (audioCtx.baseLatency * 1000).toFixed(1) + ' ms' : 'unknown';
        const outLat = audioCtx.outputLatency != null ? (audioCtx.outputLatency * 1000).toFixed(1) + ' ms' : 'unknown';

        const outlierNote = outlierIdx.size > 0
          ? `<div class="small-msg" style="margin-top:6px">Second pass removed ${outlierIdx.size} extra outlier${outlierIdx.size > 1 ? 's' : ''} (&gt; 2σ from the trimmed mean).</div>`
          : '';

        screen.innerHTML = `
      <div class="small-msg" style="margin:0">Trimmed mean reaction time</div>
      <div class="headline-value">${Math.round(finalMean)}</div>
      <div class="headline-unit">milliseconds &nbsp;·&nbsp; n = ${keptRts.length}</div>

      <div class="results-grid">${cells}</div>
      <div class="legend">
        <span class="dot" style="background:var(--border);border:1px solid var(--border)"></span>kept
        <span class="dot" style="background:var(--muted);opacity:0.5"></span>trimmed (fastest 2 / slowest 2)
        <span class="dot" style="background:var(--warn)"></span>2σ outlier
        <span class="dot" style="background:var(--danger)"></span>false start / miss
      </div>
      ${outlierNote}

      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Min kept</div><div class="stat-value">${Math.round(finalMin)} ms</div></div>
        <div class="stat"><div class="stat-label">Max kept</div><div class="stat-value">${Math.round(finalMax)} ms</div></div>
        <div class="stat"><div class="stat-label">Std dev</div><div class="stat-value">${keptStd.toFixed(1)} ms</div></div>
      </div>

      <div class="system-info">
        System audio · baseLatency ${baseLat} · outputLatency ${outLat} · sampleRate ${audioCtx.sampleRate} Hz<br>
        Lower system latency = lower measured reaction time (with the same ears).
      </div>

      <div class="button-row">
        <button id="restart-btn">Run again</button>
        <button id="copy-btn" class="secondary">Copy results</button>
      </div>
    `;

        document.getElementById('restart-btn').addEventListener('click', showIdle);
        document.getElementById('copy-btn').addEventListener('click', () => {
          const lines = [
            `Sound Latency Test — ${new Date().toISOString()}`,
            `Trimmed mean: ${Math.round(finalMean)} ms (n=${keptRts.length})`,
            `Min/Max kept: ${Math.round(finalMin)} / ${Math.round(finalMax)} ms · Std: ${keptStd.toFixed(1)} ms`,
            `System: baseLatency ${baseLat}, outputLatency ${outLat}, sampleRate ${audioCtx.sampleRate} Hz`,
            '',
            'Trial\tFreq(Hz)\tRT(ms)\tStatus',
            ...results.map((r, i) => {
              let status = 'kept';
              if (r.falseStart) status = 'false-start';
              else if (r.rt === null) status = 'miss';
              else if (outlierIdx.has(i)) status = 'outlier-2sigma';
              else if (trimmedIdx.has(i)) status = 'trimmed';
              return `${i + 1}\t${r.freq}\t${r.rt === null ? '' : Math.round(r.rt)}\t${status}`;
            })
          ].join('\n');
          navigator.clipboard.writeText(lines).then(() => {
            const btn = document.getElementById('copy-btn');
            const old = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = old; }, 1200);
          });
        });
      }

      document.addEventListener('keydown', onKey);
      document.addEventListener('mousedown', onMouseDown);
      showIdle();
    })();
  </script>
</body>

</html>
